name: CI/CD Prestashop Coolify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null

  test:
    name: Test custom modules
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check custom modules directory exists
        run: test -d prestashop/custom-modules

      - name: Verify at least one custom module exists
        run: find prestashop/custom-modules -mindepth 1 -maxdepth 1 -type d | grep .

      - name: Validate custom modules structure
        run: |
          for dir in prestashop/custom-modules/*; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 1 -type f -name "*.php" | grep . > /dev/null
          done

      - name: PHP syntax check for all custom modules
        run: find prestashop/custom-modules -type f -name "*.php" -print0 | xargs -0 -n1 php -l

  regression_predeploy:
    name: Regression tests before deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start stack locally
        run: docker compose up -d

      - name: Wait for local PrestaShop to be ready
        run: |
          for i in {1..30}; do
            status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost || true)
            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "PrestaShop is up"
              exit 0
            fi
            echo "Waiting for PrestaShop..."
            sleep 10
          done
          echo "PrestaShop did not start in time"
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Regression test - homepage HTTP OK
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost)
          if [ "$status" -ne 200 ] && [ "$status" -ne 301 ] && [ "$status" -ne 302 ]; then
            echo "Homepage returned HTTP $status"
            exit 1
          fi

      - name: Regression test - homepage content
        run: curl --fail --silent http://localhost | grep -i "La Petite Maison"

      - name: Regression test - admin login page
        run: curl --fail --silent http://localhost/admin104hsvuc059ecpn57uw | grep -i "PrestaShop"

      - name: Regression test - no install page exposed
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost/install/)
          if [ "$status" -eq 200 ]; then
            echo "Install page is still accessible"
            exit 1
          fi

      - name: Regression test - product URL rewrite
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" "http://localhost/art/4-16-affiche-encadree-the-adventure-begins.html")
          if [ "$status" -ne 200 ] && [ "$status" -ne 301 ] && [ "$status" -ne 302 ]; then
            echo "Product rewrite returned HTTP $status"
            exit 1
          fi

      - name: Show local container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: regression_predeploy

    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "Missing Coolify secrets"
            exit 1
          fi

          curl --fail --silent --show-error \
            -X POST "$COOLIFY_WEBHOOK_URL" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"

  smoke_postdeploy:
    name: Smoke and regression tests after deploy
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Wait for deployment
        run: sleep 60

      - name: Smoke test - homepage HTTP 200
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" https://prestashopcube.dev.fabdevlab.fr)
          if [ "$status" -ne 200 ]; then
            echo "Homepage returned HTTP $status"
            exit 1
          fi

      - name: Regression test - homepage content
        run: |
          curl --fail --silent https://prestashopcube.dev.fabdevlab.fr | grep -i "La Petite Maison"

      - name: Regression test - admin login page
        run: |
          curl --fail --silent https://prestashopcube.dev.fabdevlab.fr/admin104hsvuc059ecpn57uw | grep -i "PrestaShop"

      - name: Regression test - no install page exposed
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" https://prestashopcube.dev.fabdevlab.fr/install/)
          if [ "$status" -eq 200 ]; then
            echo "Install page is still accessible"
            exit 1
          fi

      - name: Regression test - product URL rewrite
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" "https://prestashopcube.dev.fabdevlab.fr/art/4-16-affiche-encadree-the-adventure-begins.html")
          if [ "$status" -ne 200 ]; then
            echo "Product rewrite returned HTTP $status"
            exit 1
          fi

    load_test:
    name: Load test
    runs-on: ubuntu-latest
    needs: smoke_postdeploy

    steps:
      - name: Install ApacheBench
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2-utils

      - name: Run load test on homepage
        run: |
          ab -n 50 -c 5 https://prestashopcube.dev.fabdevlab.fr/ | tee ab-results.txt

      - name: Check load test failed requests
        run: |
          grep "Failed requests:        0" ab-results.txt

      - name: Check load test non-2xx responses
        run: |
          if grep -q "Non-2xx responses:" ab-results.txt; then
            value=$(grep "Non-2xx responses:" ab-results.txt | awk '{print $3}')
            if [ "$value" -ne 0 ]; then
              echo "Non-2xx responses detected: $value"
              exit 1
            fi
          fi

      - name: Show summary
        run: |
          grep "Requests per second" ab-results.txt || true
          grep "Time per request" ab-results.txt || true
          grep "Failed requests" ab-results.txt || true
